<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Mensaje enviado | Tránsito Tecámac</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="estilos.css" />
  <style>
    .thanks-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--color-light);
      padding: var(--space-lg);
    }
    .thanks-card {
      background: var(--color-white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: var(--space-2xl) var(--space-xl);
      text-align: center;
      max-width: 500px;
      width: 100%;
    }
    .thanks-icon {
      font-size: 4rem;
      color: var(--color-success);
      margin-bottom: var(--space-md);
    }
    .thanks-title {
      font-size: var(--font-size-xl);
      font-weight: 800;
      color: var(--color-primary);
      margin-bottom: var(--space-sm);
    }
    .thanks-body {
      font-size: var(--font-size-base);
      color: var(--color-gray);
      line-height: 1.7;
      margin-bottom: var(--space-lg);
    }
  </style>
</head>
<body>
  <main class="thanks-page">
    <div class="thanks-card">
      <i class="fa-solid fa-circle-check thanks-icon" aria-hidden="true"></i>
      <h1 class="thanks-title">¡Mensaje recibido!</h1>
      <p class="thanks-body">
        Gracias por comunicarte con la Dirección de Tránsito y Seguridad Vial
        del H. Ayuntamiento de Tecámac. Nos pondremos en contacto contigo
        a la brevedad posible.
      </p>
      <a href="index.html" class="btn btn-primary">
        <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
        Volver al inicio
      </a>
    </div>
  </main>
</body>
</html>
